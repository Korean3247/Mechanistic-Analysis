env:
  TOKENIZERS_PARALLELISM: "false"
  HF_HUB_ENABLE_HF_TRANSFER: "1"

steps:
  - name: "llama3_8b_layer8_refit_l4"
    run:
      - "python"
      - "scripts/run_experiment.py"
      - "--config"
      - "configs/cloud/llama3_8b_l4_layer8_safe.yaml"
    skip_if_exists: "results/llama3_8b_l4_layer8_gt200_probe_placebo/metrics.json"

  - name: "llama3_external_holdout_layer8_refit_l4"
    run:
      - "python"
      - "scripts/run_frozen_direction_replay.py"
      - "--prompts"
      - "data/prompts_holdout_external.jsonl"
      - "--output-dir"
      - "results/holdout_external_llama3_l8_refit_l4"
      - "--model"
      - "meta-llama/Meta-Llama-3-8B-Instruct"
      - "--direction"
      - "results/llama3_8b_l4_layer8_gt200_probe_placebo/authority_direction_vector.pt"
      - "--layer"
      - "8"
      - "--alpha"
      - "1.0"
      - "--max-tokens"
      - "128"
      - "--dtype"
      - "bfloat16"
      - "--control-framings"
      - "direct"
      - "--refusal-margin"
      - "1.0"
    skip_if_exists: "results/holdout_external_llama3_l8_refit_l4/posthoc/posthoc_analysis.json"

  - name: "llama3_external_holdout_layer8_layer10_combo_l4"
    run:
      - "python"
      - "scripts/run_frozen_direction_replay.py"
      - "--prompts"
      - "data/prompts_holdout_external.jsonl"
      - "--output-dir"
      - "results/holdout_external_llama3_l8_l10_combo_l4"
      - "--model"
      - "meta-llama/Meta-Llama-3-8B-Instruct"
      - "--direction-spec"
      - "8:results/llama3_8b_l4_layer8_gt200_probe_placebo/authority_direction_vector.pt:1.0"
      - "--direction-spec"
      - "10:analysis_packages/llama3_full_350_m15_gt200_probe_placebo_full_paper/collected_runs/main/authority_direction_vector.pt:1.0"
      - "--max-tokens"
      - "128"
      - "--dtype"
      - "bfloat16"
      - "--control-framings"
      - "direct"
      - "--refusal-margin"
      - "1.0"
    skip_if_exists: "results/holdout_external_llama3_l8_l10_combo_l4/posthoc/posthoc_analysis.json"

  - name: "llama3_curated_layer8_layer10_combo_l4"
    run:
      - "python"
      - "scripts/run_frozen_direction_replay.py"
      - "--prompts"
      - "data/prompts.jsonl"
      - "--output-dir"
      - "results/llama3_curated_l8_l10_combo_l4"
      - "--model"
      - "meta-llama/Meta-Llama-3-8B-Instruct"
      - "--direction-spec"
      - "8:results/llama3_8b_l4_layer8_gt200_probe_placebo/authority_direction_vector.pt:1.0"
      - "--direction-spec"
      - "10:analysis_packages/llama3_full_350_m15_gt200_probe_placebo_full_paper/collected_runs/main/authority_direction_vector.pt:1.0"
      - "--max-tokens"
      - "128"
      - "--dtype"
      - "bfloat16"
      - "--control-framings"
      - "direct"
      - "hypothetical"
      - "academic"
      - "institutional"
      - "--refusal-margin"
      - "1.5"
    skip_if_exists: "results/llama3_curated_l8_l10_combo_l4/posthoc/posthoc_analysis.json"
