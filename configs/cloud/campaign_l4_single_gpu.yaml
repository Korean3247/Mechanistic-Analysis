env:
  TOKENIZERS_PARALLELISM: "false"
  HF_HUB_ENABLE_HF_TRANSFER: "1"

steps:
  - name: "llama3_8b_main_l4"
    run:
      - "python"
      - "scripts/run_experiment.py"
      - "--config"
      - "configs/cloud/llama3_8b_l4_safe.yaml"
    skip_if_exists: "results/llama3_8b_l4_full_350_m15_gt200_probe_placebo/metrics.json"

  - name: "llama3_8b_mmlu_l4"
    run:
      - "python"
      - "scripts/run_mcq_benchmark.py"
      - "--task"
      - "mmlu"
      - "--model"
      - "meta-llama/Meta-Llama-3-8B-Instruct"
      - "--output-dir"
      - "results/benchmarks/llama3_8b_l4_mmlu"
      - "--fewshot"
      - "5"
      - "--max-tokens"
      - "2048"
      - "--dtype"
      - "bfloat16"
      - "--direction"
      - "results/llama3_8b_l4_full_350_m15_gt200_probe_placebo/authority_direction_vector.pt"
      - "--layer"
      - "10"
      - "--alpha"
      - "1.0"
    skip_if_exists: "results/benchmarks/llama3_8b_l4_mmlu/summary.json"

  - name: "llama3_8b_truthfulqa_l4"
    run:
      - "python"
      - "scripts/run_mcq_benchmark.py"
      - "--task"
      - "truthfulqa_mc1"
      - "--model"
      - "meta-llama/Meta-Llama-3-8B-Instruct"
      - "--output-dir"
      - "results/benchmarks/llama3_8b_l4_truthfulqa_mc1"
      - "--max-tokens"
      - "2048"
      - "--dtype"
      - "bfloat16"
      - "--direction"
      - "results/llama3_8b_l4_full_350_m15_gt200_probe_placebo/authority_direction_vector.pt"
      - "--layer"
      - "10"
      - "--alpha"
      - "1.0"
    skip_if_exists: "results/benchmarks/llama3_8b_l4_truthfulqa_mc1/summary.json"

  - name: "gemma2_9b_refit_l4"
    run:
      - "python"
      - "scripts/run_experiment.py"
      - "--config"
      - "configs/cloud/gemma2_9b_l4_safe.yaml"
    skip_if_exists: "results/gemma2_9b_l4_full_350_m10_gt200_probe_placebo/metrics.json"
