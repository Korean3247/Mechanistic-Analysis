env:
  TOKENIZERS_PARALLELISM: "false"
  HF_HUB_ENABLE_HF_TRANSFER: "1"

steps:
  - name: "llama3_70b_main"
    run:
      - "python"
      - "scripts/run_experiment.py"
      - "--config"
      - "configs/cloud/llama3_70b_full_350_m15_gt200_probe_placebo.yaml"
    skip_if_exists: "results/llama3_70b_full_350_m15_gt200_probe_placebo/metrics.json"

  - name: "llama3_70b_mmlu"
    run:
      - "python"
      - "scripts/run_mcq_benchmark.py"
      - "--task"
      - "mmlu"
      - "--model"
      - "meta-llama/Meta-Llama-3-70B-Instruct"
      - "--output-dir"
      - "results/benchmarks/llama3_70b_mmlu"
      - "--fewshot"
      - "5"
      - "--max-tokens"
      - "2048"
      - "--dtype"
      - "bfloat16"
      - "--direction"
      - "results/llama3_70b_full_350_m15_gt200_probe_placebo/authority_direction_vector.pt"
      - "--layer"
      - "40"
      - "--alpha"
      - "1.0"
    skip_if_exists: "results/benchmarks/llama3_70b_mmlu/summary.json"

  - name: "llama3_70b_truthfulqa"
    run:
      - "python"
      - "scripts/run_mcq_benchmark.py"
      - "--task"
      - "truthfulqa_mc1"
      - "--model"
      - "meta-llama/Meta-Llama-3-70B-Instruct"
      - "--output-dir"
      - "results/benchmarks/llama3_70b_truthfulqa_mc1"
      - "--max-tokens"
      - "2048"
      - "--dtype"
      - "bfloat16"
      - "--direction"
      - "results/llama3_70b_full_350_m15_gt200_probe_placebo/authority_direction_vector.pt"
      - "--layer"
      - "40"
      - "--alpha"
      - "1.0"
    skip_if_exists: "results/benchmarks/llama3_70b_truthfulqa_mc1/summary.json"

  - name: "gemma2_9b_refit"
    run:
      - "python"
      - "scripts/run_experiment.py"
      - "--config"
      - "configs/cloud/gemma2_9b_full_350_m15_gt200_probe_placebo.yaml"
    skip_if_exists: "results/gemma2_9b_full_350_m15_gt200_probe_placebo/metrics.json"

  - name: "qwen25_72b_refit"
    run:
      - "python"
      - "scripts/run_experiment.py"
      - "--config"
      - "configs/cloud/qwen25_72b_full_350_m15_gt200_probe_placebo.yaml"
    skip_if_exists: "results/qwen25_72b_full_350_m15_gt200_probe_placebo/metrics.json"
